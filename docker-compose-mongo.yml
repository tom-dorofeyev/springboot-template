services:
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: superheroes
      MONGO_INITDB_ROOT_USERNAME: superhero
      MONGO_INITDB_ROOT_PASSWORD: superhero
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mongo
      SPRING_DATA_MONGODB_URI: mongodb://superhero:superhero@mongodb:27017/superheroes?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongodata:

spring.datasource.url=jdbc:postgresql://localhost:5432/superheroes
spring.datasource.username=superhero
spring.datasource.password=superhero
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Re-enable JPA auto-config (excluded in base application.properties for inmemory)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
